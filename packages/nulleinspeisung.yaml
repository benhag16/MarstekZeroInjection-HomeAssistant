# ============================================================================
# Nulleinspeisung mit Marstek Venus E 3.0 (Home-Assistant-Package)
# ============================================================================
# Regelprinzip: Inkrementeller Regler, Takt 15 s.
#   neuer Sollwert = alter Sollwert + Faktor x (Netzleistung - Ziel)
#   Sollwert > 0  -> Akku entlaedt | Sollwert < 0 -> Akku laedt | 0 -> Standby
#
# >>> ANPASSEN: Diese Entity-IDs muessen zu deinem System passen. <<<
# Bei Abweichungen: Suchen & Ersetzen in dieser Datei (alle Vorkommen).
#   sensor.tasmota_e320_power_in                            Netzleistung in W (+ Bezug / - Einspeisung)
#   sensor.pv_leistung                                      PV-Leistung in W
#   switch.marstek_venus_modbus_rs485_steuermodus           RS485-Steuermodus
#   select.marstek_venus_modbus_erzwungener_modus           Force Mode
#   number.marstek_venus_modbus_ladeleistung_einstellen     Lade-Sollwert (W)
#   number.marstek_venus_modbus_entladeleistung_einstellen  Entlade-Sollwert (W)
#   sensor.marstek_venus_modbus_soc_batterie                Batterie-SoC (%)
#
# Force-Mode-Optionen: In den Automationen sind die Optionswerte "standby",
# "charge", "discharge" hinterlegt (Variablen opt_standby/opt_laden/opt_entladen).
# Pruefe das options-Attribut der Select-Entitaet und passe sie ggf. an.
#
# HINWEIS: Die Regel-Parameter (input_number mit "initial:") werden bei jedem
# HA-Neustart auf die Werte aus dieser Datei zurueckgesetzt. Dauerhafte
# Aenderungen daher hier in der Datei vornehmen, nicht nur per UI-Regler.
# ============================================================================

input_boolean:
  nulleinspeisung_aktiv:
    name: Nulleinspeisung aktiv
    icon: mdi:transmission-tower-off

input_number:
  nulleinspeisung_ziel:
    name: Nulleinspeisung Zielwert
    min: -200
    max: 200
    step: 5
    initial: 0
    unit_of_measurement: W
    icon: mdi:target
  nulleinspeisung_totband:
    name: Nulleinspeisung Totband
    min: 5
    max: 200
    step: 5
    initial: 25
    unit_of_measurement: W
    icon: mdi:arrow-expand-horizontal
  nulleinspeisung_faktor:
    name: Nulleinspeisung Reglerfaktor
    min: 0.1
    max: 1
    step: 0.05
    initial: 0.7
    icon: mdi:tune
  nulleinspeisung_max_ladeleistung:
    name: Nulleinspeisung max. Ladeleistung
    min: 0
    max: 2500
    step: 50
    initial: 2500
    unit_of_measurement: W
    icon: mdi:battery-arrow-up
  nulleinspeisung_max_entladeleistung:
    name: Nulleinspeisung max. Entladeleistung
    min: 0
    max: 2500
    step: 50
    initial: 2500
    unit_of_measurement: W
    icon: mdi:battery-arrow-down
  nulleinspeisung_min_soc:
    name: Nulleinspeisung minimaler SoC
    min: 5
    max: 50
    step: 1
    initial: 12
    unit_of_measurement: "%"
    icon: mdi:battery-low
  nulleinspeisung_pv_schwelle:
    name: Nulleinspeisung PV-Schwelle Ladefreigabe
    min: 0
    max: 500
    step: 10
    initial: 50
    unit_of_measurement: W
    icon: mdi:solar-power
  # Interner Reglerzustand - nicht manuell verstellen.
  nulleinspeisung_sollwert:
    name: Nulleinspeisung Sollwert (intern)
    min: -2500
    max: 2500
    step: 1
    initial: 0
    unit_of_measurement: W
    mode: box
    icon: mdi:battery-charging

template:
  - binary_sensor:
      - name: "Nulleinspeisung Messwerte OK"
        unique_id: nulleinspeisung_messwerte_ok
        device_class: connectivity
        state: >-
          {% set s = states.sensor.tasmota_e320_power_in %}
          {{ s is not none
             and s.state not in ['unavailable', 'unknown']
             and (now() - s.last_updated) < timedelta(seconds=120) }}
  - sensor:
      - name: "Nulleinspeisung Status"
        unique_id: nulleinspeisung_status
        icon: mdi:state-machine
        state: >-
          {%- set soll = states('input_number.nulleinspeisung_sollwert') | float(0) -%}
          {%- if is_state('input_boolean.nulleinspeisung_aktiv', 'off') -%}
            Aus
          {%- elif is_state('binary_sensor.nulleinspeisung_messwerte_ok', 'off') -%}
            Störung: keine Zählerdaten
          {%- elif states('select.marstek_venus_modbus_erzwungener_modus') in ['unavailable', 'unknown'] -%}
            Störung: Akku nicht erreichbar
          {%- elif is_state('switch.marstek_venus_modbus_rs485_steuermodus', 'off') -%}
            Wartet: RS485-Modus aus
          {%- elif soll > 0 -%}
            Entlädt ({{ soll | round(0) | int }} W)
          {%- elif soll < 0 -%}
            Lädt ({{ (-soll) | round(0) | int }} W)
          {%- else -%}
            Standby
          {%- endif -%}

automation:
  # --------------------------------------------------------------------------
  # Regler: laeuft alle 15 s, schreibt nur bei Aenderung ausserhalb des Totbands.
  # --------------------------------------------------------------------------
  - alias: "Nulleinspeisung: Regler"
    id: nulleinspeisung_regler
    mode: single
    max_exceeded: silent
    variables:
      netz_sensor: sensor.tasmota_e320_power_in
      pv_sensor: sensor.pv_leistung
      soc_sensor: sensor.marstek_venus_modbus_soc_batterie
      force_select: select.marstek_venus_modbus_erzwungener_modus
      nr_laden: number.marstek_venus_modbus_ladeleistung_einstellen
      nr_entladen: number.marstek_venus_modbus_entladeleistung_einstellen
      rs485_switch: switch.marstek_venus_modbus_rs485_steuermodus
      opt_standby: standby
      opt_laden: charge
      opt_entladen: discharge
    triggers:
      - trigger: time_pattern
        seconds: "/15"
    conditions:
      - condition: state
        entity_id: input_boolean.nulleinspeisung_aktiv
        state: "on"
      - condition: state
        entity_id: binary_sensor.nulleinspeisung_messwerte_ok
        state: "on"
      - condition: template
        value_template: "{{ states(force_select) not in ['unavailable', 'unknown'] }}"
      - condition: template
        value_template: "{{ is_state(rs485_switch, 'on') }}"
    actions:
      # Totband: bei kleiner Abweichung nichts tun (kein Modbus-Write)
      - condition: template
        value_template: >-
          {{ ((states(netz_sensor) | float(0))
              - (states('input_number.nulleinspeisung_ziel') | float(0))) | abs
             >= (states('input_number.nulleinspeisung_totband') | float(25)) }}
      - variables:
          neu: >-
            {% set netz = states(netz_sensor) | float(0) %}
            {% set ziel = states('input_number.nulleinspeisung_ziel') | float(0) %}
            {% set faktor = states('input_number.nulleinspeisung_faktor') | float(0.7) %}
            {% set alt = states('input_number.nulleinspeisung_sollwert') | float(0) %}
            {% set soc = states(soc_sensor) | float(0) %}
            {% set pv = states(pv_sensor) | float(0) %}
            {% set max_lade = states('input_number.nulleinspeisung_max_ladeleistung') | float(2500) %}
            {% set max_entlade = states('input_number.nulleinspeisung_max_entladeleistung') | float(2500) %}
            {% set min_soc = states('input_number.nulleinspeisung_min_soc') | float(12) %}
            {% set pv_schwelle = states('input_number.nulleinspeisung_pv_schwelle') | float(50) %}
            {# Obergrenze Entladen: 0 wenn Akku leer #}
            {% set ober = 0 if soc <= min_soc else max_entlade %}
            {# Untergrenze Laden: 0 wenn Akku voll oder PV unter Schwelle #}
            {% set unter = 0 if (soc >= 100 or pv < pv_schwelle) else -max_lade %}
            {{ [unter, [ober, alt + faktor * (netz - ziel)] | min] | max | round(0) | int }}
      # Sollwert-Helfer nur bei Aenderung aktualisieren
      - if: "{{ neu != (states('input_number.nulleinspeisung_sollwert') | float(0) | round(0) | int) }}"
        then:
          - action: input_number.set_value
            target:
              entity_id: input_number.nulleinspeisung_sollwert
            data:
              value: "{{ neu }}"
      # Akku-Zustand jeden Zyklus absichern (schreibt nur bei Abweichung).
      # Korrigiert so auch einen veralteten Befehl, falls der Akku nach einem
      # Verbindungsabriss noch mit altem Sollwert laeuft.
      - choose:
          - conditions: "{{ neu > 0 }}"
            sequence:
              - if: "{{ (states(nr_entladen) | float(-1) | round(0) | int) != neu }}"
                then:
                  - action: number.set_value
                    target:
                      entity_id: "{{ nr_entladen }}"
                    data:
                      value: "{{ neu }}"
              - if: "{{ states(force_select) != opt_entladen }}"
                then:
                  - action: select.select_option
                    target:
                      entity_id: "{{ force_select }}"
                    data:
                      option: "{{ opt_entladen }}"
          - conditions: "{{ neu < 0 }}"
            sequence:
              - if: "{{ (states(nr_laden) | float(-1) | round(0) | int) != -neu }}"
                then:
                  - action: number.set_value
                    target:
                      entity_id: "{{ nr_laden }}"
                    data:
                      value: "{{ -neu }}"
              - if: "{{ states(force_select) != opt_laden }}"
                then:
                  - action: select.select_option
                    target:
                      entity_id: "{{ force_select }}"
                    data:
                      option: "{{ opt_laden }}"
        default:
          - if: "{{ states(force_select) != opt_standby }}"
            then:
              - action: select.select_option
                target:
                  entity_id: "{{ force_select }}"
                data:
                  option: "{{ opt_standby }}"

  # --------------------------------------------------------------------------
  # Watchdog: Stoerungen erkennen -> Akku auf Standby + Benachrichtigung.
  # --------------------------------------------------------------------------
  - alias: "Nulleinspeisung: Watchdog"
    id: nulleinspeisung_watchdog
    mode: queued
    max: 5
    variables:
      force_select: select.marstek_venus_modbus_erzwungener_modus
      opt_standby: standby
    triggers:
      - trigger: state
        entity_id: binary_sensor.nulleinspeisung_messwerte_ok
        to: "off"
        id: zaehler_weg
      - trigger: state
        entity_id: select.marstek_venus_modbus_erzwungener_modus
        to: ["unavailable", "unknown"]
        for: "00:01:00"
        id: akku_weg
      - trigger: state
        entity_id: switch.marstek_venus_modbus_rs485_steuermodus
        from: "on"
        to: "off"
        for: "00:00:05"
        id: rs485_aus
      - trigger: state
        entity_id: binary_sensor.nulleinspeisung_messwerte_ok
        from: "off"
        to: "on"
        for: "00:00:30"
        id: zaehler_da
    conditions:
      - condition: state
        entity_id: input_boolean.nulleinspeisung_aktiv
        state: "on"
    actions:
      - choose:
          - conditions:
              - condition: trigger
                id: zaehler_weg
            sequence:
              - action: input_number.set_value
                target:
                  entity_id: input_number.nulleinspeisung_sollwert
                data:
                  value: 0
              - action: select.select_option
                continue_on_error: true
                target:
                  entity_id: "{{ force_select }}"
                data:
                  option: "{{ opt_standby }}"
              - action: notify.notify
                data:
                  title: "Nulleinspeisung"
                  message: >-
                    ⚠️ Keine Zählerdaten vom Hichi seit 2 Minuten.
                    Akku wurde auf Standby gesetzt.
          - conditions:
              - condition: trigger
                id: akku_weg
            sequence:
              - action: input_number.set_value
                target:
                  entity_id: input_number.nulleinspeisung_sollwert
                data:
                  value: 0
              - action: notify.notify
                data:
                  title: "Nulleinspeisung"
                  message: >-
                    ⚠️ Marstek-Akku über Modbus nicht erreichbar.
                    Regelung pausiert, bis die Verbindung zurück ist.
          - conditions:
              - condition: trigger
                id: rs485_aus
            sequence:
              - action: notify.notify
                data:
                  title: "Nulleinspeisung"
                  message: >-
                    ⚠️ Der RS485-Steuermodus hat sich deaktiviert — die Regelung
                    ist wirkungslos. Bitte den Schalter wieder einschalten
                    (bekanntes Firmware-Verhalten).
          - conditions:
              - condition: trigger
                id: zaehler_da
            sequence:
              - action: notify.notify
                data:
                  title: "Nulleinspeisung"
                  message: "✅ Zählerdaten wieder vorhanden — Regelung läuft weiter."

  # --------------------------------------------------------------------------
  # Lifecycle: sauberer Zustand bei HA-Start und Master-Schalter an/aus.
  # --------------------------------------------------------------------------
  - alias: "Nulleinspeisung: Initialisierung & Master-Schalter"
    id: nulleinspeisung_lifecycle
    mode: queued
    max: 5
    variables:
      force_select: select.marstek_venus_modbus_erzwungener_modus
      rs485_switch: switch.marstek_venus_modbus_rs485_steuermodus
      opt_standby: standby
    triggers:
      - trigger: homeassistant
        event: start
        id: ha_start
      - trigger: state
        entity_id: input_boolean.nulleinspeisung_aktiv
        to: "on"
        id: master_an
      - trigger: state
        entity_id: input_boolean.nulleinspeisung_aktiv
        to: "off"
        id: master_aus
    actions:
      - action: input_number.set_value
        target:
          entity_id: input_number.nulleinspeisung_sollwert
        data:
          value: 0
      - choose:
          - conditions:
              - condition: trigger
                id: master_aus
            sequence:
              - action: select.select_option
                continue_on_error: true
                target:
                  entity_id: "{{ force_select }}"
                data:
                  option: "{{ opt_standby }}"
          - conditions:
              - condition: state
                entity_id: input_boolean.nulleinspeisung_aktiv
                state: "on"
            sequence:
              - action: switch.turn_on
                continue_on_error: true
                target:
                  entity_id: "{{ rs485_switch }}"
              - delay: "00:00:02"
              - action: select.select_option
                continue_on_error: true
                target:
                  entity_id: "{{ force_select }}"
                data:
                  option: "{{ opt_standby }}"
